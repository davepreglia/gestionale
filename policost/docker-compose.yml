version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: policost_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: policost_enterprise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    container_name: policost_backend_fastapi
    restart: always
    volumes:
      - ./backend-fastapi:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend-fastapi/.env
    environment:
      - POSTGRES_SERVER=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
