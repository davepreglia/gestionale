services:
  # 🧠 Backend Web Service (Flask API)
  - type: web
    name: policost-backend
    env: python
    rootDir: policost/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User will input their Neon PostgreSQL URL or default to local SQLite (ephemeral)
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://policost-frontend.onrender.com,http://localhost:5173,http://localhost:5174
      - key: FRONTEND_URL
        value: https://policost-frontend.onrender.com

  # 💻 Frontend Static Site (React + Vite)
  - type: web
    name: policost-frontend
    env: static
    rootDir: policost/frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://policost-backend.onrender.com/api
    routes:
      # Redirect all frontend routing requests to index.html to support SPA routing (prevent 404s)
      - type: rewrite
        source: /*
        destination: /index.html
